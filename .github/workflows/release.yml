name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build & Release (macOS ARM64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: desktop
        run: bun install

      - name: Inject version from tag
        working-directory: desktop
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Injecting version: $VERSION"
          sed -i '' "s/\"version\": \"0.0.1\"/\"version\": \"$VERSION\"/" package.json
          sed -i '' "s/version: \"0.0.1\"/version: \"$VERSION\"/" electrobun.config.ts

      - name: Build app
        working-directory: desktop
        run: bun run build

      - name: Package zip
        working-directory: desktop/build/dev-macos-arm64
        run: zip -r -y Tango-macos-arm64.zip Tango-dev.app

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Tango ${{ github.ref_name }}
          body: |
            ## Install

            **One-liner:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/MartinGonzalez/tango-app/main/scripts/install.sh | bash
            ```

            **Manual:**
            1. Download `Tango-macos-arm64.zip` below
            2. Unzip and move `Tango-dev.app` to `/Applications`
            3. Right-click the app → Open (required on first launch since the app is unsigned)
          files: |
            desktop/build/dev-macos-arm64/Tango-macos-arm64.zip
            scripts/install.sh
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
