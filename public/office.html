<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Claude Code Pixel Office</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0e0e0e;
            height: 100vh;
            overflow: hidden;
        }
        #game-container {
            width: 100vw;
            height: 100vh;
        }
        canvas { image-rendering: pixelated; }
    </style>
</head>
<body>

<div id="game-container"></div>

<script type="module">
import { OfficeAdapter, activityToZone } from './office.js';

const DESK_SCALE = 0.5;
const BOARD_SCALE = 0.4;
const SEAT_OFFSET_Y = 10;
const DESK_POSITIONS = [
    // Top row — 3 desks
    { x: 130, y: 170 }, { x: 250, y: 170 }, { x: 370, y: 170 },
    // Bottom row — 3 desks
    { x: 130, y: 300 }, { x: 250, y: 300 }, { x: 370, y: 300 }
];

const BOARD_POSITIONS = [
    { x: 550, y: 120 },
    { x: 700, y: 120 }
];

const MAP_POINTS = {
    ENTRANCE: { x: 400, y: 470 },
    WORK: DESK_POSITIONS.map(p => ({ x: p.x, y: p.y + SEAT_OFFSET_Y })),
    // Standing spots in front of each board (2 per board)
    WHITEBOARD: [
        { x: 535, y: 175 }, { x: 565, y: 175 },
        { x: 685, y: 175 }, { x: 715, y: 175 }
    ],
    LOUNGE: [
        { x: 610, y: 370 }, { x: 650, y: 370 }, { x: 690, y: 370 },
        { x: 610, y: 410 }, { x: 650, y: 410 }, { x: 690, y: 410 }
    ]
};

const POLL_MS = 2000;
const adapter = new OfficeAdapter();
let scene = null;

class OfficeScene extends Phaser.Scene {
    constructor() { super('OfficeScene'); }

    preload() {
        this.load.spritesheet('coder', '/art/programmer-sheet.png', {
            frameWidth: 288, frameHeight: 305
        });
        this.load.image('floor-tile', '/art/floor-tile.png');
        this.load.image('desk', '/art/desk.png');
        this.load.image('board', '/art/board.png');
        this.load.image('floor-lounge', '/art/floor-lounge.png');
        this.load.image('wall', '/art/wall.png');
    }

    create() {
        // Floor — tiled parquet
        this.add.tileSprite(400, 250, 800, 500, 'floor-tile').setDepth(0);
        this.drawOfficeLayout();

        this.anims.create({
            key: 'walk',
            frames: this.anims.generateFrameNumbers('coder', { start: 3, end: 8 }),
            frameRate: 8,
            repeat: -1
        });
        this.anims.create({
            key: 'idle',
            frames: [{ key: 'coder', frame: 0 }],
            frameRate: 20
        });

        this.agents = {};
        scene = this;

        startPolling();
    }

    drawOfficeLayout() {
        // Desk sprites
        DESK_POSITIONS.forEach(p => {
            this.add.image(p.x, p.y, 'desk').setScale(DESK_SCALE).setDepth(p.y);
        });

        // Lounge room — wall on top, floor extends to bottom
        this.add.tileSprite(650, 310, 200, 60, 'wall').setDepth(0.3);
        this.add.tileSprite(650, 410, 200, 180, 'floor-lounge').setDepth(0.5);
        // Boards (2 side by side)
        BOARD_POSITIONS.forEach(p => {
            this.add.image(p.x, p.y, 'board').setScale(BOARD_SCALE).setDepth(p.y);
        });

        // Zone labels
        this.add.text(300, 85, 'WORK', { fontSize: '10px', color: '#00ff41' }).setOrigin(0.5).setDepth(1000);
        this.add.text(625, 80, 'PLAN', { fontSize: '10px', color: '#ffaa00' }).setOrigin(0.5).setDepth(1000);
        this.add.text(650, 345, 'LOUNGE', { fontSize: '10px', color: '#888' }).setOrigin(0.5).setDepth(1000);
    }

    addAgent(id, name, zone, deskIndex) {
        if (this.agents[id]) return;

        const container = this.add.container(MAP_POINTS.ENTRANCE.x, MAP_POINTS.ENTRANCE.y);
        const sprite = this.add.sprite(0, 0, 'coder').setScale(0.293);
        const label = this.add.text(0, -40, name, {
            fontSize: '10px',
            backgroundColor: '#000a',
            color: '#0f0',
            padding: { x: 3, y: 1 }
        }).setOrigin(0.5);
        const bubble = this.add.circle(15, -30, 5, 0xffffff).setAlpha(0);

        container.add([sprite, label, bubble]);
        container.setDepth(MAP_POINTS.ENTRANCE.y);

        this.agents[id] = { container, sprite, bubble, name, deskIndex };

        // Tween to target zone
        const target = this.getZoneTarget(zone, deskIndex);
        this.tweenTo(id, target, zone);
    }

    moveAgent(id, zone, deskIndex) {
        const agent = this.agents[id];
        if (!agent) return;

        const target = this.getZoneTarget(zone, deskIndex);
        this.tweenTo(id, target, zone);
    }

    removeAgent(id) {
        const agent = this.agents[id];
        if (!agent) return;

        this.tweens.add({
            targets: agent.container,
            x: MAP_POINTS.ENTRANCE.x,
            y: MAP_POINTS.ENTRANCE.y,
            alpha: 0,
            duration: 1500,
            onStart: () => agent.sprite.play('walk'),
            onComplete: () => {
                agent.container.destroy();
                delete this.agents[id];
            }
        });
    }

    getZoneTarget(zone, deskIndex) {
        if (zone === 'work') {
            const idx = deskIndex % MAP_POINTS.WORK.length;
            return MAP_POINTS.WORK[idx];
        }
        if (zone === 'plan') {
            const idx = (deskIndex || 0) % MAP_POINTS.WHITEBOARD.length;
            return MAP_POINTS.WHITEBOARD[idx];
        }
        const idx = (deskIndex || 0) % MAP_POINTS.LOUNGE.length;
        return MAP_POINTS.LOUNGE[idx];
    }

    tweenTo(id, target, zone) {
        const agent = this.agents[id];
        if (!agent) return;

        agent.bubble.setAlpha(zone === 'plan' ? 1 : 0);

        // Flip sprite based on movement direction
        const goingLeft = target.x < agent.container.x;
        agent.sprite.setFlipX(goingLeft ? true : false);

        this.tweens.add({
            targets: agent.container,
            x: target.x,
            y: target.y,
            duration: 2000,
            ease: 'Sine.easeInOut',
            onStart: () => agent.sprite.play('walk'),
            onUpdate: () => {
                agent.container.setDepth(agent.container.y + 1);
            },
            onComplete: () => {
                agent.sprite.stop();
                agent.sprite.play('idle');
            }
        });
    }
}

const game = new Phaser.Game({
    type: Phaser.AUTO,
    width: 800,
    height: 500,
    parent: 'game-container',
    scene: OfficeScene,
    pixelArt: true,
    scale: {
        mode: Phaser.Scale.FIT,
        autoCenter: Phaser.Scale.CENTER_BOTH
    }
});

// ── Polling + Reconciliation ──

async function poll() {
    try {
        const res = await fetch('/api/snapshot');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const snapshot = await res.json();
        const cmds = adapter.reconcile(snapshot);

        for (const cmd of cmds.spawn) {
            scene.addAgent(cmd.id, cmd.name, cmd.zone, cmd.deskIndex);
        }
        for (const cmd of cmds.move) {
            scene.moveAgent(cmd.id, cmd.zone, cmd.deskIndex);
        }
        for (const cmd of cmds.remove) {
            scene.removeAgent(cmd.id);
        }
    } catch (err) {
        console.warn('Poll failed:', err.message);
    }
}

function startPolling() {
    poll();
    setInterval(poll, POLL_MS);
}
</script>
</body>
</html>
