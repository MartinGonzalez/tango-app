<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Claude Watcher</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Realtime local monitor</p>
          <h1>Claude Watcher</h1>
          <p id="lastUpdated" class="subtext">Waiting for first sample...</p>
        </div>
        <div class="metrics">
          <article>
            <p>Claude processes</p>
            <strong id="processCount">0</strong>
          </article>
          <article>
            <p>Tracked tasks</p>
            <strong id="taskCount">0</strong>
          </article>
          <article>
            <p>Event log size</p>
            <strong id="eventCount">0</strong>
          </article>
        </div>
      </header>

      <section class="panel controls">
        <label>
          Filter by status
          <select id="statusFilter">
            <option value="all">all</option>
            <option value="running">running</option>
            <option value="sleeping">sleeping</option>
            <option value="stopped">stopped</option>
            <option value="zombie">zombie</option>
          </select>
        </label>
        <label>
          Search command
          <input id="commandFilter" type="text" placeholder="claude / repo / task" />
        </label>
      </section>

      <section>
        <h2>Live Process Cards</h2>
        <div id="processGrid" class="process-grid"></div>
      </section>
    </main>
    <script src="/app.js" type="module"></script>
  </body>
</html>
