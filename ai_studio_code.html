<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Claude Code Pixel Office</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #0e0e0e; display: flex; font-family: 'Courier New', monospace; }
        #ui-side { width: 320px; height: 100vh; background: #1a1a1a; border-right: 2px solid #333; color: #00ff41; padding: 20px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; margin-bottom: 8px; background: #222; border: 1px solid #00ff41; color: #00ff41; cursor: pointer; text-transform: uppercase; font-weight: bold; }
        .btn:hover { background: #00ff41; color: #000; }
        .log { font-size: 12px; height: 200px; overflow-y: auto; background: #000; padding: 10px; border: 1px solid #333; margin-top: 20px; color: #888; }
        #game-container { flex-grow: 1; display: flex; align-items: center; justify-content: center; background: #111; }
        canvas { border: 4px solid #333; image-rendering: pixelated; }
    </style>
</head>
<body>

<div id="ui-side">
    <h3>CLAUDE_OFFICE v1.0</h3>
    <button class="btn" onclick="apiSpawn()">Spawn Claude Agent</button>
    <button class="btn" onclick="apiMove('work')">Mover a Programar</button>
    <button class="btn" onclick="apiMove('plan')">Mover a Pizarrón</button>
    <button class="btn" onclick="apiMove('lounge')">Mover a Cafetería</button>
    <div class="log" id="log">> Esperando señal...</div>
</div>

<div id="game-container"></div>

<script>
    const MAP_POINTS = {
        ENTRANCE: { x: 400, y: 450 },
        WORK: [ {x: 180, y: 180}, {x: 280, y: 180}, {x: 180, y: 280}, {x: 280, y: 280} ],
        WHITEBOARD: { x: 500, y: 120 },
        LOUNGE: { x: 650, y: 380 }
    };

    class OfficeScene extends Phaser.Scene {
        constructor() { super('OfficeScene'); }

        preload() {
            // Personaje Pixel Art (Spritesheet de 32x32)
            // Usamos un asset de ejemplo de Phaser (un explorador, pero pixel art)
            this.load.spritesheet('coder', 'https://labs.phaser.io/assets/sprites/dude.png', { frameWidth: 32, frameHeight: 48 });
            
            // Icono de "Thinking" (Burbuja)
            this.load.image('bubble', 'https://labs.phaser.io/assets/sprites/bubble.png');
        }

        create() {
            // Dibujar el suelo (Tilemap simulado)
            this.add.grid(400, 250, 800, 500, 32, 32, 0x2d2d2d).setOutlineStyle(0x333333);

            // Dibujar Mobiliario Simple (Placeholder con Profundidad)
            this.drawOfficeLayout();

            // Crear Animaciones del Programador
            this.anims.create({
                key: 'walk',
                frames: this.anims.generateFrameNumbers('coder', { start: 0, end: 3 }),
                frameRate: 10,
                repeat: -1
            });
            this.anims.create({
                key: 'idle',
                frames: [ { key: 'coder', frame: 4 } ],
                frameRate: 20
            });

            this.agents = {};
            this.lastCreatedId = null;
        }

        drawOfficeLayout() {
            // Mesas (Depth alto para que el personaje pase por detrás)
            const deskColor = 0x444444;
            MAP_POINTS.WORK.forEach(p => {
                let desk = this.add.rectangle(p.x, p.y - 10, 40, 20, 0x666666).setDepth(p.y);
                this.add.rectangle(p.x, p.y - 20, 30, 5, 0x00ff00).setDepth(p.y + 1); // Monitor "verde"
            });

            // Sofa
            this.add.rectangle(MAP_POINTS.LOUNGE.x, MAP_POINTS.LOUNGE.y, 100, 40, 0x884444).setDepth(MAP_POINTS.LOUNGE.y);
            
            // Pizarrón
            this.add.rectangle(MAP_POINTS.WHITEBOARD.x, MAP_POINTS.WHITEBOARD.y - 40, 120, 60, 0xeeeeee).setDepth(10);
        }

        addAgent(id, name) {
            const container = this.add.container(MAP_POINTS.ENTRANCE.x, MAP_POINTS.ENTRANCE.y);
            
            const sprite = this.add.sprite(0, 0, 'coder').setScale(1.2);
            const label = this.add.text(0, -40, name, { fontSize: '12px', backgroundColor: '#000', color: '#0f0' }).setOrigin(0.5);
            
            // Burbuja de pensamiento (oculta al inicio)
            const bubble = this.add.circle(15, -30, 5, 0xffffff).setAlpha(0);

            container.add([sprite, label, bubble]);
            container.setDepth(MAP_POINTS.ENTRANCE.y);

            this.agents[id] = { container, sprite, bubble, name };
            this.lastCreatedId = id;
            
            this.moveAgent(id, 'lounge');
        }

        moveAgent(id, zone) {
            const agent = this.agents[id];
            if (!agent) return;

            let target = MAP_POINTS.LOUNGE;
            if (zone === 'work') target = MAP_POINTS.WORK[Math.floor(Math.random()*MAP_POINTS.WORK.length)];
            if (zone === 'plan') target = MAP_POINTS.WHITEBOARD;

            // Mostrar burbuja si va al pizarrón (Thinking)
            agent.bubble.setAlpha(zone === 'plan' ? 1 : 0);

            this.tweens.add({
                targets: agent.container,
                x: target.x,
                y: target.y,
                duration: 2000,
                onStart: () => agent.sprite.play('walk'),
                onUpdate: () => {
                    // Actualizar profundidad para efecto 3D
                    agent.container.setDepth(agent.container.y);
                },
                onComplete: () => {
                    agent.sprite.stop();
                    agent.sprite.play('idle');
                }
            });
        }
    }

    const game = new Phaser.Game({
        type: Phaser.AUTO,
        width: 800,
        height: 500,
        parent: 'game-container',
        scene: OfficeScene,
        pixelArt: true
    });

    // --- FUNCIONES DE LA API ---
    let count = 0;
    function apiSpawn() {
        count++;
        const id = 'claude_' + count;
        game.scene.scenes[0].addAgent(id, 'CLAUDE_ID_' + count);
        document.getElementById('log').innerHTML += `<div>> Spawned Claude instance ${id}</div>`;
    }

    function apiMove(zone) {
        const scene = game.scene.scenes[0];
        if (scene.lastCreatedId) {
            scene.moveAgent(scene.lastCreatedId, zone);
            document.getElementById('log').innerHTML += `<div>> Agent ${scene.lastCreatedId} moving to ${zone}</div>`;
        }
    }
</script>
</body>
</html>
