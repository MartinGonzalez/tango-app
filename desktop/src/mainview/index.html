<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tango</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="views://mainview/styles.css">
  <script>
    (function () {
      const trace = [];
      const stamp = () => new Date().toISOString();
      const push = (step) => trace.push(`${stamp()} ${step}`);
      const stringify = (value) => {
        if (value == null) return "";
        if (typeof value === "string") return value;
        if (value && value.stack) return `${value.message || "Error"}\n${value.stack}`;
        try { return JSON.stringify(value); } catch { return String(value); }
      };
      const show = (title, detail) => {
        const body = document.body || document.documentElement;
        if (!body) return;
        body.innerHTML = "";
        const container = document.createElement("div");
        container.style.cssText = "height:100vh;overflow:auto;padding:16px;background:#111315;color:#f5f5f5;font:12px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;";
        container.innerHTML = `
          <h2 style="margin:0 0 12px;color:#ffb4a6;font-size:16px;">Tango Boot Error</h2>
          <div style="margin:0 0 8px;color:#fca5a5;">${title}</div>
          <pre style="white-space:pre-wrap;margin:0 0 12px;">${stringify(detail)}</pre>
          <div style="margin:0 0 6px;color:#9ca3af;">Boot trace</div>
          <pre style="white-space:pre-wrap;margin:0;">${trace.join("\n")}</pre>
        `;
        body.appendChild(container);
      };

      window.__tangoBootShow = show;
      window.__tangoBootTrace = trace;
      push("html:bootstrap");
      window.addEventListener("error", (event) => {
        push("window:error");
        show("window.error", event.error || event.message || "Unknown error");
      });
      window.addEventListener("unhandledrejection", (event) => {
        push("window:unhandledrejection");
        show("window.unhandledrejection", event.reason || "Unknown rejection");
      });
      document.addEventListener("DOMContentLoaded", () => {
        push("dom:content-loaded");
      });
    })();
  </script>
  <script
    src="views://mainview/index.js"
    defer
    onerror="window.__tangoBootShow && window.__tangoBootShow('Failed to load mainview bundle', 'views://mainview/index.js failed to load')"
  ></script>
</head>
<body>
  <div id="app">
    <!-- Title bar drag region for macOS traffic lights -->
    <div id="titlebar" style="app-region: drag">
      <div class="titlebar-left" style="app-region: no-drag">
        <button id="btn-toggle-stages" class="titlebar-btn" title="Toggle sidebar (Cmd+1)">
          <span class="material-symbols-outlined">menu</span>
        </button>
      </div>
      <div class="titlebar-drag" style="app-region: drag"></div>
    </div>

    <!-- Panel container — filled by JS -->
    <div id="panels"></div>
  </div>
</body>
</html>
