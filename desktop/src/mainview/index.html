<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claudex</title>
  <link rel="stylesheet" href="views://mainview/styles.css">
  <script src="views://mainview/index.js" defer></script>
</head>
<body>
  <div id="app">
    <!-- Title bar drag region -->
    <div id="titlebar" style="app-region: drag">
      <div class="titlebar-left" style="app-region: no-drag">
        <button id="btn-toggle-workspaces" class="titlebar-btn" title="Toggle workspaces (Cmd+B)">
          <span class="tb-icon">&#9776;</span>
        </button>
      </div>
      <div class="titlebar-drag" style="app-region: drag"></div>
      <div class="titlebar-right" style="app-region: no-drag"></div>
    </div>

    <!-- Panel container — filled by JS -->
    <div id="panels"></div>
  </div>
</body>
</html>
