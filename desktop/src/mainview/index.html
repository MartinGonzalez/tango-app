<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tango</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="views://mainview/styles.css">
  <script>
    (function () {
      const trace = [];
      const stamp = () => new Date().toISOString();
      const push = (step) => trace.push(`${stamp()} ${step}`);
      const stringify = (value) => {
        if (value == null) return "";
        if (typeof value === "string") return value;
        if (value && value.stack) return `${value.message || "Error"}\n${value.stack}`;
        try { return JSON.stringify(value); } catch { return String(value); }
      };
      let bootOverlay = null;
      const dismissBootOverlay = () => {
        if (bootOverlay) { bootOverlay.remove(); bootOverlay = null; }
        window.removeEventListener("keydown", onBootEsc);
      };
      const onBootEsc = (e) => { if (e.key === "Escape") dismissBootOverlay(); };

      const show = (title, detail) => {
        // If the TS error handler is ready, let it handle errors
        if (window.__tangoTSErrorHandlerReady) return;

        const body = document.body || document.documentElement;
        if (!body) return;

        // Create modal overlay (inline styles since CSS may not be loaded yet)
        if (!bootOverlay) {
          bootOverlay = document.createElement("div");
          bootOverlay.style.cssText = "position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;padding:18px;background:rgba(0,0,0,0.58);";
          bootOverlay.addEventListener("click", dismissBootOverlay);

          const dialog = document.createElement("div");
          dialog.style.cssText = "width:min(860px,90%);max-height:80vh;overflow-y:auto;padding:18px;border-radius:18px;border:1px solid #5a2020;background:#1e1e1e;box-shadow:0 22px 46px rgba(0,0,0,0.45);";
          dialog.addEventListener("click", (e) => e.stopPropagation());

          const header = document.createElement("div");
          header.style.cssText = "display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;";

          const titleEl = document.createElement("div");
          titleEl.style.cssText = "font-size:18px;font-weight:700;color:#fca5a5;";
          titleEl.textContent = "Tango Boot Error";

          const closeBtn = document.createElement("button");
          closeBtn.style.cssText = "width:28px;height:28px;border-radius:8px;border:1px solid transparent;background:transparent;color:#9ca3af;font-size:24px;line-height:1;cursor:pointer;";
          closeBtn.textContent = "\u00d7";
          closeBtn.addEventListener("click", dismissBootOverlay);

          header.appendChild(titleEl);
          header.appendChild(closeBtn);

          const entries = document.createElement("div");
          entries.className = "__boot-error-entries";

          dialog.appendChild(header);
          dialog.appendChild(entries);
          bootOverlay.appendChild(dialog);
          body.appendChild(bootOverlay);
          window.addEventListener("keydown", onBootEsc);
        }

        const entries = bootOverlay.querySelector(".__boot-error-entries");
        if (!entries) return;

        const entry = document.createElement("div");
        entry.style.cssText = "padding:12px;border-radius:10px;background:#1a1a1a;border:1px solid #333;margin-bottom:14px;";

        const ctx = document.createElement("div");
        ctx.style.cssText = "font-size:13px;font-weight:600;color:#ffb4a6;margin-bottom:8px;";
        ctx.textContent = title;

        const stack = document.createElement("pre");
        stack.style.cssText = "font:11px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace;color:#d1d5db;white-space:pre-wrap;word-break:break-word;margin:0;";
        stack.textContent = stringify(detail);

        const traceLabel = document.createElement("div");
        traceLabel.style.cssText = "font-size:12px;color:#9ca3af;margin-top:10px;margin-bottom:4px;";
        traceLabel.textContent = "Boot trace";

        const tracePre = document.createElement("pre");
        tracePre.style.cssText = "font:10px/1.4 ui-monospace,SFMono-Regular,Menlo,monospace;color:#9ca3af;white-space:pre-wrap;word-break:break-word;margin:0;";
        tracePre.textContent = trace.join("\n");

        entry.appendChild(ctx);
        entry.appendChild(stack);
        entry.appendChild(traceLabel);
        entry.appendChild(tracePre);
        entries.appendChild(entry);
      };

      window.__tangoBootShow = show;
      window.__tangoBootTrace = trace;
      push("html:bootstrap");
      window.addEventListener("error", (event) => {
        push("window:error");
        show("window.error", event.error || event.message || "Unknown error");
      });
      window.addEventListener("unhandledrejection", (event) => {
        push("window:unhandledrejection");
        show("window.unhandledrejection", event.reason || "Unknown rejection");
      });
      document.addEventListener("DOMContentLoaded", () => {
        push("dom:content-loaded");
      });
    })();
  </script>
  <script
    src="views://mainview/index.js"
    defer
    onerror="window.__tangoBootShow && window.__tangoBootShow('Failed to load mainview bundle', 'views://mainview/index.js failed to load')"
  ></script>
</head>
<body>
  <div id="app">
    <!-- Title bar drag region for macOS traffic lights -->
    <div id="titlebar" style="app-region: drag">
      <div class="titlebar-left" style="app-region: no-drag">
        <button id="btn-toggle-stages" class="titlebar-btn" title="Toggle sidebar (Cmd+1)">
          <span class="material-symbols-outlined">menu</span>
        </button>
        <button id="btn-update" class="update-btn" style="display: none" title="A new version of Tango is available">
          <span class="material-symbols-outlined">upgrade</span>
          <span class="update-btn-label">Update</span>
        </button>
      </div>
      <div class="titlebar-drag" style="app-region: drag"></div>
    </div>

    <!-- Panel container — filled by JS -->
    <div id="panels"></div>
  </div>
</body>
</html>
